      resources:
        limits:
          cpus: 4.0
          memory: 4gb
        reservations:
          cpus: 2.0
          memory: 2gb
    secrets:
      - edbtoken_secret
      - edbrepository_secret
    volumes:
      - ./data:/whpgdata
      - ./data/seg1/data:/whpgdata
#      - ./data/seg1/gpadmin_ssh:/home/gpadmin/.ssh
#      - ./data/seg1/root_ssh:/root/.ssh
#      - ./data/seg1/etc_ssh:/etc/ssh
    environment:
      - container=docker
    platform: linux/amd64
    hostname: seg1
    networks:
      whpg-sme-network:

  seg2:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - edbtoken_secret
        - edbrepository_secret
    deploy:
      resources:
        limits:
          cpus: 4.0
          memory: 4gb
        reservations:
          cpus: 2.0
          memory: 2gb
    secrets:
      - edbtoken_secret
      - edbrepository_secret
    volumes:
      - ./data:/whpgdata
      - ./data/seg2/data:/whpgdata
#      - ./data/seg2/gpadmin_ssh:/home/gpadmin/.ssh
#      - ./data/seg2/root_ssh:/root/.ssh
#      - ./data/seg2/etc_ssh:/etc/ssh
    environment:
      - container=docker
    platform: linux/amd64
    hostname: seg2
    networks:
      whpg-sme-network:

  gpfdist:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - edbtoken_secret
        - edbrepository_secret
    deploy:
      resources:
        limits:
          cpus: 2.0
          memory: 1gb
        reservations:
          cpus: 1.0
          memory: 1gb
    secrets:
      - edbtoken_secret
      - edbrepository_secret
    volumes:
      - ./data:/whpgdata
      - ./data/gpfdist/data:/whpgdata
#      - ./data/gpfdist/gpadmin_ssh:/home/gpadmin/.ssh
#      - ./data/gpfdist/root_ssh:/root/.ssh
#      - ./data/gpfdist/etc_ssh:/etc/ssh
    environment:
      - container=docker
    platform: linux/amd64
    hostname: gpfdist
    networks:
      whpg-sme-network:


secrets:
  edbtoken_secret:
    environment: EDBTOKEN
  edbrepository_secret:
    environment: EDBREPOSITORY


networks:
  whpg-sme-network:
    driver: bridge
