services:
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - edbtoken_secret
        - edbrepository_secret
    deploy:
      resources:
        limits:
          cpus: 4.0
          memory: 4gb
        reservations:
          cpus: 1.0
          memory: 1gb
    secrets:
      - edbtoken_secret
      - edbrepository_secret
    ports:
      - "6436:5432"
    volumes:
      - ./data/coordinator/data:/whpgdata
#      - ./data/coordinator/gpadmin_ssh:/home/gpadmin/.ssh
#      - ./data/coordinator/root_ssh:/root/.ssh
#      - ./data/coordinator/etc_ssh:/etc/ssh
    environment:
      - container=docker
    platform: linux/amd64
    hostname: coordinator
    networks:
      whpg-sme-network:

  standby:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - edbtoken_secret
        - edbrepository_secret
    deploy:
      resources:
        limits:
          cpus: 4.0
          memory: 4gb
        reservations:
          cpus: 1.0
          memory: 1gb
    secrets:
      - edbtoken_secret
      - edbrepository_secret
    ports:
      - "6437:5432"
    volumes:
      - ./data:/whpgdata
      - ./data/standby/data:/whpgdata
#      - ./data/standby/gpadmin_ssh:/home/gpadmin/.ssh
#      - ./data/standby/root_ssh:/root/.ssh
#      - ./data/standby/etc_ssh:/etc/ssh
    environment:
      - container=docker
    platform: linux/amd64
    hostname: standby
    networks:
      whpg-sme-network:

  seg1:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - edbtoken_secret
        - edbrepository_secret
